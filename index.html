  <!-- FAQ Structured Data (para aparecer nas pesquisas) -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",

    "mainEntity": [
      {
        "@type": "Question",
        "name": "O que é a Yield Bruta?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "A Yield Bruta é a renda anual dividida pelo valor do imóvel, expressa em percentagem. É uma métrica simples para comparar imóveis rapidamente, mas não considera despesas, impostos ou financiamento. Uma boa yield bruta em Portugal é superior a 5%."
        }
      },
      {
        "@type": "Question",
        "name": "O que é o Cap Rate?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "O Cap Rate (Capitalization Rate) é o NOI (Net Operating Income) dividido pelo valor do imóvel. O NOI é a renda menos as despesas operacionais, antes de impostos. É o padrão internacional para comparar investimentos imobiliários. Um bom cap rate é superior a 4.5%."
        }
      },
      {
        "@type": "Question",
        "name": "Como é calculado o IMT para investimento?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "O IMT para segundas habitações e investimento usa uma tabela diferente da habitação própria permanente (HPP). As taxas são mais elevadas: 1% até €101.917, subindo progressivamente até 7.5% para valores acima de €1.102.920."
        }
      },
      {
        "@type": "Question",
        "name": "Qual a taxa de IRS sobre rendas em Portugal?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "A taxa de IRS sobre rendas varia conforme a duração do contrato de arrendamento: 28% para contratos inferiores a 2 anos, 25% de 2 a 5 anos, 15% de 5 a 10 anos, 10% de 10 a 20 anos, e 5% para contratos de 20 anos ou mais."
        }
      }
    ]
  }
