      "acceptedAnswer": {
        "@type": "Answer",
        "text": "O Cap Rate (Capitalization Rate) é o NOI (renda menos despesas) dividido pelo valor do imóvel. É o padrão internacional para avaliar investimentos imobiliários, permitindo comparar imóveis em diferentes países ou com outros tipos de investimentos. Um bom Cap Rate em Portugal situa-se acima de 4.5%."
      }
    },
    {
      "@type": "Question",
      "name": "Como se calcula o IMT para investimento em Portugal?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "O IMT para segundas habitações e investimento usa uma tabela diferente da habitação própria permanente. As taxas variam de 1% (até €101.917) a 7.5% (acima de €1.102.920), com parcelas a abater em cada escalão. Por exemplo, um imóvel de €200.000 paga aproximadamente €4.991 de IMT."
      }
    },
    {
      "@type": "Question",
      "name": "Qual a taxa de IRS sobre rendas em Portugal?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "A taxa autónoma de IRS sobre rendas varia conforme a duração do contrato: 28% para menos de 2 anos, 25% de 2-5 anos, 15% de 5-10 anos, 10% de 10-20 anos, e apenas 5% para contratos de 20 anos ou mais."
      }
    },
    {
      "@type": "Question",
      "name": "O que são mais-valias imobiliárias?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "As mais-valias são o lucro obtido na venda de um imóvel (preço de venda menos preço de compra atualizado). Em Portugal, 50% da mais-valia é tributada à taxa marginal de IRS do contribuinte, que pode chegar a 48% nos escalões mais altos."
      }
    }
  ]
